<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Vazirmatn', system-ui, sans-serif; }
    .menu-card { transition: all 0.4s ease; }
    .menu-card.visible { opacity: 1; transform: translateY(0); }
    .menu-image { height: 180px; object-fit: cover; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-md mx-auto bg-zinc-900 min-h-screen">

    <div class="sticky top-0 bg-zinc-900 border-b border-zinc-700 z-10">
      <div class="p-6 flex items-center gap-3">
        <i class="fa-solid fa-mug-hot text-4xl text-amber-500"></i>
        <h1 class="text-3xl font-bold">آب و آتش</h1>
      </div>

      <div class="px-6 pb-6">
        <input id="searchInput" type="text" placeholder="جستجو..." 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl py-4 px-6 pl-12 focus:outline-none focus:border-amber-500">
      </div>

      <!-- دسته‌بندی پویا -->
      <div id="categoryContainer" class="px-6 pb-4 flex gap-2 overflow-x-auto"></div>
    </div>

    <div id="menuContainer" class="p-6 grid grid-cols-2 gap-5"></div>
  </div>

  <script>
    let menuItems = [];
    let allCategories = [];

    async function loadMenuData() {
      try {
        const res = await fetch(`menu-data.json?t=${Date.now()}`);
        menuItems = await res.json();
        renderCategories();
        renderMenu(menuItems);
      } catch (err) {
        console.error(err);
      }
    }

    function getCategories() {
      const cats = new Set(['all']);
      menuItems.forEach(item => cats.add(item.category));
      return Array.from(cats);
    }

    function renderCategories() {
      allCategories = getCategories();
      const container = document.getElementById('categoryContainer');
      container.innerHTML = '';

      allCategories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `category-chip px-7 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap ${cat === 'all' ? 'active bg-amber-500 text-black' : 'bg-zinc-800 hover:bg-zinc-700'}`;
        btn.textContent = cat === 'all' ? 'همه' : cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.onclick = () => filterCategory(cat);
        container.appendChild(btn);
      });
    }

    function renderMenu(items) {
      const container = document.getElementById('menuContainer');
      container.innerHTML = items.map((item, index) => `
        <div class="menu-card bg-zinc-800 rounded-3xl overflow-hidden" style="animation-delay: ${index*80}ms">
          <div class="relative">
            ${item.image ? 
              `<img src="${item.image}" class="menu-image w-full">` : 
              `<div class="h-[180px] bg-zinc-700 flex items-center justify-center text-8xl">${item.emoji || '☕'}</div>`
            }
          </div>
          <div class="p-4 text-center">
            <h3 class="font-bold text-lg">${item.name}</h3>
            <p class="text-zinc-400 text-sm mt-1">${item.desc || ''}</p>
            <p class="text-amber-400 font-bold mt-3">${item.price} هزار تومان</p>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-chip').forEach(b => b.classList.remove('active', 'bg-amber-500', 'text-black'));
      
      const buttons = document.querySelectorAll('.category-chip');
      for (let btn of buttons) {
        if ((cat === 'all' && btn.textContent === 'همه') || btn.textContent.toLowerCase() === cat) {
          btn.classList.add('active', 'bg-amber-500', 'text-black');
          break;
        }
      }

      const filtered = cat === 'all' ? menuItems : menuItems.filter(item => item.category === cat);
      renderMenu(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = menuItems.filter(item => 
        item.name.toLowerCase().includes(term) || 
        (item.desc && item.desc.toLowerCase().includes(term))
      );
      renderMenu(filtered);
    });

    loadMenuData();
  </script>
</body>
</html>
