<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت پیشرفته - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">پنل مدیریت Lumina Café</h1>
      <a href="index.html" class="text-amber-400 flex items-center gap-2 hover:underline">
        <i class="fa-solid fa-eye"></i> دیدن منو
      </a>
    </div>

    <div class="flex gap-3 mb-6">
      <button onclick="downloadJSON()" class="flex-1 bg-amber-600 hover:bg-amber-700 py-3 rounded-2xl font-medium">
        <i class="fa-solid fa-download"></i> دانلود JSON
      </button>
      <label class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl font-medium text-center cursor-pointer">
        <i class="fa-solid fa-upload"></i> بارگذاری JSON
        <input type="file" id="fileInput" accept=".json" class="hidden" onchange="loadJSONFile(event)">
      </label>
    </div>

    <!-- Add/Edit Form -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <h2 class="text-xl mb-4 font-semibold">افزودن یا ویرایش آیتم</h2>
      <form id="itemForm" class="grid grid-cols-1 gap-4">
        <input type="hidden" id="editId">
        <input id="name" placeholder="نام آیتم" class="bg-zinc-800 p-4 rounded-2xl" required>
        <div class="grid grid-cols-2 gap-4">
          <input id="price" placeholder="قیمت (هزار تومان)" class="bg-zinc-800 p-4 rounded-2xl" required>
          <input id="category" placeholder="دسته (coffee, tea,...)" class="bg-zinc-800 p-4 rounded-2xl" required>
        </div>
        <input id="desc" placeholder="توضیح کوتاه" class="bg-zinc-800 p-4 rounded-2xl">
        <input id="emoji" placeholder="ایموجی یا لینک عکس" class="bg-zinc-800 p-4 rounded-2xl">
        <button type="submit" class="mt-2 bg-green-600 hover:bg-green-700 py-4 rounded-3xl font-medium">
          ذخیره آیتم
        </button>
      </form>
    </div>

    <!-- List -->
    <h2 class="text-xl font-semibold mb-4">آیتم‌های منو</h2>
    <div id="adminList" class="space-y-3"></div>
  </div>

  <script>
    let menuItems = [];

    async function loadInitialData() {
      try {
        const res = await fetch('menu-data.json');
        menuItems = await res.json();
      } catch (e) {
        menuItems = [];
      }
      renderList();
    }

    function renderList() {
      const container = document.getElementById('adminList');
      container.innerHTML = menuItems.map(item => `
        <div class="bg-zinc-900 rounded-3xl p-5 flex justify-between items-center group">
          <div>
            <div class="font-bold text-lg">${item.name}</div>
            <div class="text-zinc-400">${item.desc || ''} — ${item.price} هزار تومان</div>
          </div>
          <div class="flex gap-4 opacity-70 group-hover:opacity-100">
            <button onclick="editItem(${item.id})" class="text-blue-400 hover:text-blue-300">
              ✏️
            </button>
            <button onclick="deleteItem(${item.id})" class="text-red-400 hover:text-red-300">
              🗑️
            </button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('itemForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;

      const newItem = {
        id: id ? Number(id) : Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        emoji: document.getElementById('emoji').value || "☕"
      };

      if (id) {
        menuItems = menuItems.map(i => i.id == id ? newItem : i);
      } else {
        menuItems.push(newItem);
      }

      renderList();
      e.target.reset();
      document.getElementById('editId').value = '';
    });

    function editItem(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('category').value = item.category;
        document.getElementById('desc').value = item.desc || '';
        document.getElementById('emoji').value = item.emoji || '';
      }
    }

    function deleteItem(id) {
      if (confirm('حذف شود؟')) {
        menuItems = menuItems.filter(i => i.id !== id);
        renderList();
      }
    }

    function downloadJSON() {
      const dataStr = JSON.stringify(menuItems, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
      const exportFileDefaultName = 'menu-data.json';

      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
    }

    function loadJSONFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          menuItems = JSON.parse(e.target.result);
          renderList();
          alert('فایل با موفقیت بارگذاری شد!');
        } catch (err) {
          alert('فایل معتبر نیست!');
        }
      };
      reader.readAsText(file);
    }

    // Init
    loadInitialData();
  </script>
</body>
</html>
