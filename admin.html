<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between mb-8">
      <h1 class="text-3xl font-bold">پنل مدیریت</h1>
      <a href="index.html" class="text-amber-400 hover:underline">← منوی مشتری</a>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <label class="block mb-2">Token</label>
      <input type="password" id="githubToken" placeholder="ghp_..." class="w-full bg-zinc-800 p-4 rounded-2xl">
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6">
      <h2 class="text-xl mb-6">افزودن آیتم جدید</h2>
      <form id="itemForm">
        <input id="name" placeholder="نام آیتم" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4" required>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
          <input id="price" placeholder="قیمت" class="bg-zinc-800 p-4 rounded-2xl" required>
          <input id="category" placeholder="دسته" class="bg-zinc-800 p-4 rounded-2xl" required>
        </div>

        <input id="desc" placeholder="توضیح" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">

        <!-- انتخاب و آپلود عکس -->
        <div class="mb-6">
          <label class="block text-sm mb-2">عکس آیتم</label>
          <input type="file" id="imageFile" accept="image/*" class="block w-full text-sm text-zinc-300 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:bg-amber-600 file:text-white">
          <div id="preview" class="hidden mt-4">
            <img id="previewImg" class="max-h-52 rounded-3xl">
          </div>
        </div>

        <button type="submit" class="w-full bg-green-600 py-4 rounded-3xl font-medium">ذخیره و آپلود</button>
      </form>
    </div>

    <div id="status" class="text-center my-6"></div>
  </div>

  <script>
    const OWNER = "mainemail84-blip";   // تغییر بده
    const REPO = "aboatash";

    let selectedFile = null;

    document.getElementById('imageFile').addEventListener('change', function(e) {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('previewImg').src = ev.target.result;
          document.getElementById('preview').classList.remove('hidden');
        };
        reader.readAsDataURL(selectedFile);
      }
    });

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('githubToken').value.trim();
      if (!token) return alert("توکن را وارد کنید!");

      const status = document.getElementById('status');
      status.innerHTML = "در حال آپلود عکس و اطلاعات...";

      let imagePath = null;

      if (selectedFile) {
        // آپلود عکس به پوشه images
        const fileName = Date.now() + '-' + selectedFile.name.replace(/\s+/g, '-');
        imagePath = `images/${fileName}`;

        const success = await uploadImageToGitHub(selectedFile, fileName, token);
        if (!success) {
          status.innerHTML = "خطا در آپلود عکس";
          return;
        }
      }

      // ذخیره آیتم
      const newItem = {
        id: Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        image: imagePath,
        emoji: "☕"
      };

      // اینجا باید menuItems رو لود کنی و اضافه کنی و آپلود کنی (کد کامل‌تر نیاز داره)
      alert("عکس آپلود شد! (برای کامل شدن کد menuItems رو مدیریت کن)");
    });

    async function uploadImageToGitHub(file, fileName, token) {
      const reader = new FileReader();
      return new Promise((resolve) => {
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1];
          try {
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images/${fileName}`, {
              method: 'PUT',
              headers: {
                Authorization: `token ${token}`,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                message: `Add image ${fileName}`,
                content: base64
              })
            });
            resolve(true);
          } catch (err) {
            console.error(err);
            resolve(false);
          }
        };
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
