<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <i class="fa-solid fa-mug-hot text-amber-500"></i>
        پنل مدیریت
      </h1>
      <a href="index.html" class="text-amber-400 hover:underline">← منوی مشتری</a>
    </div>

    <!-- GitHub Token -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <label class="block text-sm mb-2">GitHub Token</label>
      <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxx" 
             class="w-full bg-zinc-800 p-4 rounded-2xl">
    </div>

    <!-- Form -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-6">افزودن / ویرایش آیتم</h2>
      <form id="itemForm">
        <input type="hidden" id="editId">

        <div class="grid grid-cols-1 gap-4">
          <input id="name" placeholder="نام آیتم" class="bg-zinc-800 p-4 rounded-2xl" required>

          <div class="grid grid-cols-2 gap-4">
            <input id="price" placeholder="قیمت (هزار تومان)" class="bg-zinc-800 p-4 rounded-2xl" required>
            <input id="category" placeholder="دسته (coffee, tea,...)" class="bg-zinc-800 p-4 rounded-2xl" required>
          </div>

          <input id="desc" placeholder="توضیح کوتاه" class="bg-zinc-800 p-4 rounded-2xl">

          <!-- انتخاب عکس از دستگاه -->
          <div>
            <label class="block text-sm mb-2 text-zinc-400">عکس آیتم</label>
            <input type="file" id="imageFile" accept="image/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-amber-600 file:text-white hover:file:bg-amber-700">
            <input type="text" id="imageUrl" placeholder="یا لینک عکس (اختیاری)" class="mt-3 w-full bg-zinc-800 p-4 rounded-2xl">
          </div>

          <input id="emoji" placeholder="ایموجی پشتیبان (اگر عکس انتخاب نشد)" class="bg-zinc-800 p-4 rounded-2xl">
        </div>

        <button type="submit" class="mt-8 w-full bg-green-600 hover:bg-green-700 py-4 rounded-3xl font-medium">
          ذخیره و آپلود به GitHub
        </button>
      </form>
    </div>

    <div id="status" class="text-center mb-6"></div>

    <!-- لیست آیتم‌ها -->
    <h2 class="text-xl font-semibold mb-4">آیتم‌های فعلی</h2>
    <div id="adminList" class="space-y-4"></div>
  </div>

  <script>
    const OWNER = "mainemail84-blip";   // ← تغییر بده
    const REPO = "aboatash"; // ← تغییر بده

    let menuItems = [];

    async function loadData() {
      try {
        const res = await fetch(`menu-data.json?t=${Date.now()}`);
        menuItems = await res.json();
      } catch(e) {}
      renderList();
    }

    function renderList() {
      const container = document.getElementById('adminList');
      container.innerHTML = menuItems.map(item => `
        <div class="bg-zinc-900 p-5 rounded-3xl flex gap-4 items-center">
          <div class="w-20 h-20 bg-zinc-800 rounded-2xl overflow-hidden flex-shrink-0">
            ${item.image ? 
              `<img src="${item.image}" class="w-full h-full object-cover">` : 
              `<div class="w-full h-full flex items-center justify-center text-5xl">${item.emoji || '☕'}</div>`
            }
          </div>
          <div class="flex-1">
            <div class="font-bold">${item.name}</div>
            <div class="text-sm text-zinc-400">${item.desc || ''}</div>
            <div class="text-amber-400 font-medium">${item.price} هزار تومان</div>
          </div>
          <div>
            <button onclick="editItem(${item.id})" class="text-blue-400 px-3 py-1">ویرایش</button>
            <button onclick="deleteItem(${item.id})" class="text-red-400 px-3 py-1">حذف</button>
          </div>
        </div>
      `).join('');
    }

    // تبدیل عکس به Base64 و ذخیره لینک
    let selectedImageBase64 = null;

    document.getElementById('imageFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        selectedImageBase64 = ev.target.result;
        document.getElementById('imageUrl').value = "عکس انتخاب شد (برای آپلود)";
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('githubToken').value.trim();
      if (!token) return alert("توکن GitHub را وارد کنید!");

      const newItem = {
        id: document.getElementById('editId').value ? Number(document.getElementById('editId').value) : Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        image: document.getElementById('imageUrl').value.includes("عکس انتخاب شد") ? selectedImageBase64 : document.getElementById('imageUrl').value,
        emoji: document.getElementById('emoji').value || "☕"
      };

      if (document.getElementById('editId').value) {
        menuItems = menuItems.map(item => item.id == newItem.id ? newItem : item);
      } else {
        menuItems.push(newItem);
      }

      const status = document.getElementById('status');
      status.innerHTML = "در حال آپلود...";

      if (await updateGitHub(token)) {
        status.innerHTML = '<span class="text-green-400">✅ با موفقیت ذخیره و آپلود شد</span>';
        renderList();
        e.target.reset();
        selectedImageBase64 = null;
        document.getElementById('editId').value = '';
      }
    });

    // بقیه توابع (updateGitHub, editItem, deleteItem) مثل قبل...

    async function updateGitHub(token) {
      try {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(menuItems, null, 2))));
        let sha = null;
        try {
          const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
            headers: { Authorization: `token ${token}` }
          });
          if (r.ok) sha = (await r.json()).sha;
        } catch {}
        await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: "Update menu with image", content, sha })
        });
        return true;
      } catch (err) {
        console.error(err);
        alert("خطا در آپلود به GitHub");
        return false;
      }
    }

    function editItem(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('category').value = item.category;
        document.getElementById('desc').value = item.desc || '';
        document.getElementById('imageUrl').value = item.image || '';
        document.getElementById('emoji').value = item.emoji || '';
      }
    }

    function deleteItem(id) {
      if (confirm('حذف شود؟')) {
        menuItems = menuItems.filter(i => i.id !== id);
        renderList();
      }
    }

    loadData();
  </script>
</body>
</html>
