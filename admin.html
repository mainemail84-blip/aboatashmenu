<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت - آب و آتش</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
<div class="max-w-2xl mx-auto p-6">
<div class="flex justify-between items-center mb-8">
<h1 class="text-3xl font-bold">پنل مدیریت</h1>
<a href="index.html" class="text-amber-400 hover:underline">← منوی مشتری</a>
</div>

<div class="bg-zinc-900 rounded-3xl p-6 mb-8">
<label class="block mb-2">GitHub Token</label>
<input type="password" id="githubToken" placeholder="ghp_..." class="w-full bg-zinc-800 p-4 rounded-2xl">
<p class="text-xs text-zinc-500 mt-2">⚠️ این توکن فقط در مرورگر شما نگه‌داری می‌شود و به هیچ سروری ارسال نمی‌شود، اما هرکسی که این صفحه را باز کند و توکن را وارد کند می‌تواند منو را تغییر دهد. لینک این صفحه را عمومی نکنید.</p>
</div>

<!-- پیام خطای بارگذاری -->
<div id="loadError" class="hidden bg-red-950 border border-red-700 text-red-300 text-sm p-4 rounded-2xl mb-6"></div>

<!-- فرم آیتم -->
<div class="bg-zinc-900 rounded-3xl p-6 mb-10">
<h2 class="text-xl mb-6" id="formTitle">افزودن / ویرایش آیتم</h2>
<form id="itemForm">
<input type="hidden" id="editId">
<input id="name" placeholder="نام آیتم" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4" required>
<div class="grid grid-cols-2 gap-4 mb-4">
<input id="price" placeholder="قیمت (تومان)" class="bg-zinc-800 p-4 rounded-2xl" required>
<input id="category" list="categoryList" placeholder="دسته‌بندی (جدید یا موجود)" class="bg-zinc-800 p-4 rounded-2xl" required>
<datalist id="categoryList"></datalist>
</div>
<input id="desc" placeholder="توضیح" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
<div class="grid grid-cols-3 gap-4 mb-4">
<div>
<label class="block text-xs text-zinc-400 mb-1">امتیاز (۱ تا ۵)</label>
<input id="rating" type="number" step="0.1" min="1" max="5" placeholder="4.5" class="bg-zinc-800 p-4 rounded-2xl w-full">
</div>
<div>
<label class="block text-xs text-zinc-400 mb-1">درصد تخفیف</label>
<input id="discount" type="number" step="1" min="0" max="90" placeholder="0" class="bg-zinc-800 p-4 rounded-2xl w-full">
</div>
<div class="flex flex-col justify-end">
<label class="flex items-center gap-2 bg-zinc-800 p-4 rounded-2xl cursor-pointer h-full">
<input id="popular" type="checkbox" class="w-4 h-4">
<span class="text-sm">محبوب</span>
</label>
</div>
</div>
<div class="mb-6">
<label class="block text-sm mb-2">عکس آیتم</label>
<input type="file" id="imageFile" accept="image/*" class="block w-full text-sm text-zinc-300 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:bg-amber-600 file:text-white">
<div id="preview" class="hidden mt-4">
<img id="previewImg" class="max-h-52 rounded-3xl">
</div>
</div>
<div class="flex gap-3">
<button type="submit" class="flex-1 bg-green-600 py-4 rounded-3xl font-medium">ذخیره و آپلود</button>
<button type="button" onclick="cancelEdit()" id="cancelBtn" class="hidden bg-zinc-700 px-6 rounded-3xl font-medium">انصراف</button>
</div>
</form>
</div>

<div id="status" class="text-center my-6"></div>

<!-- لیست آیتم‌ها -->
<h2 class="text-xl font-semibold mb-4">آیتم‌های فعلی (<span id="itemCount">0</span>)</h2>
<div id="adminList" class="space-y-8"></div>
</div>

<script>
const OWNER = "mainemail84-blip";
const REPO = "aboatashmenu";
let menuItems = [];
let selectedFile = null;

document.getElementById('imageFile').addEventListener('change', function(e) {
  selectedFile = e.target.files[0];
  if (selectedFile) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('preview').classList.remove('hidden');
    };
    reader.readAsDataURL(selectedFile);
  }
});

document.getElementById('itemForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = document.getElementById('githubToken').value.trim();
  if (!token) return alert("توکن را وارد کنید!");

  const status = document.getElementById('status');
  status.innerHTML = "در حال آپلود...";

  let imagePath = null;
  const editId = document.getElementById('editId').value;

  if (selectedFile) {
    const fileName = Date.now() + '-' + selectedFile.name.replace(/\s+/g, '-').toLowerCase();
    imagePath = `images/${fileName}`;
    const uploaded = await uploadImage(selectedFile, fileName, token);
    if (!uploaded) {
      status.innerHTML = `<span class="text-red-400">❌ خطا در آپلود عکس</span>`;
      return;
    }
  }

  // همیشه قبل از ذخیره، آخرین نسخه را از گیت‌هاب بگیر تا رونویسی نشود
  try {
    const res = await fetch(`menu-data.json?t=${Date.now()}`);
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data)) menuItems = data;
    }
  } catch (e) { /* اگر نشد از آخرین لیست حافظه استفاده می‌شود */ }

  const existing = editId ? menuItems.find(i => i.id == editId) : null;

  const newItem = {
    id: editId ? Number(editId) : Date.now(),
    name: document.getElementById('name').value,
    price: document.getElementById('price').value,
    category: document.getElementById('category').value.trim(),
    desc: document.getElementById('desc').value,
    rating: document.getElementById('rating').value ? Number(document.getElementById('rating').value) : (existing?.rating || null),
    discount: document.getElementById('discount').value ? Number(document.getElementById('discount').value) : 0,
    popular: document.getElementById('popular').checked,
    image: imagePath || (existing ? existing.image : null),
    emoji: existing?.emoji || "☕"
  };

  if (editId) {
    menuItems = menuItems.map(i => i.id == newItem.id ? newItem : i);
  } else {
    menuItems.push(newItem);
  }

  const saved = await saveMenuData(token);
  if (saved) {
    status.innerHTML = `<span class="text-green-400">✅ ذخیره شد</span>`;
    cancelEdit();
    loadData();
  } else {
    status.innerHTML = `<span class="text-red-400">❌ خطا در ذخیره‌سازی (توکن یا دسترسی را بررسی کنید)</span>`;
  }
});

function cancelEdit() {
  document.getElementById('itemForm').reset();
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').innerText = 'افزودن / ویرایش آیتم';
  document.getElementById('cancelBtn').classList.add('hidden');
  document.getElementById('preview').classList.add('hidden');
  selectedFile = null;
}

async function uploadImage(file, fileName, token) {
  const reader = new FileReader();
  return new Promise((resolve) => {
    reader.onload = async function(e) {
      const base64 = e.target.result.split(',')[1];
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/images/${fileName}`, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: `Add image`, content: base64 })
        });
        resolve(res.ok);
      } catch (err) {
        resolve(false);
      }
    };
    reader.readAsDataURL(file);
  });
}

async function saveMenuData(token) {
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(menuItems, null, 2))));
    let sha = null;
    try {
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
        headers: { Authorization: `token ${token}` }
      });
      if (r.ok) sha = (await r.json()).sha;
    } catch(e) {}

    const putRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Update menu", content, sha })
    });
    if (!putRes.ok) {
      const errBody = await putRes.text();
      console.error('saveMenuData failed:', putRes.status, errBody);
    }
    return putRes.ok;
  } catch (err) {
    console.error(err);
    return false;
  }
}

function showLoadError(message) {
  const box = document.getElementById('loadError');
  box.classList.remove('hidden');
  box.innerHTML = `⚠️ ${message}`;
}
function hideLoadError() {
  document.getElementById('loadError').classList.add('hidden');
}

function loadData() {
  fetch(`menu-data.json?t=${Date.now()}`)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status} — فایل menu-data.json پیدا نشد یا در دسترس نیست`);
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) throw new Error('فرمت menu-data.json درست نیست (باید یک آرایه JSON باشد)');
      menuItems = data;
      hideLoadError();
      updateCategoryList();
      renderList();
    })
    .catch((err) => {
      console.error('loadData error:', err);
      menuItems = [];
      let hint = err.message;
      if (location.protocol === 'file:') {
        hint += '<br>احتمالاً صفحه را مستقیم (file://) باز کرده‌اید — این حالت به‌خاطر محدودیت CORS مرورگر کار نمی‌کند. صفحه را از طریق GitHub Pages یا یک سرور محلی (مثلاً VSCode Live Server) باز کنید.';
      }
      showLoadError(hint);
      renderList();
    });
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// به‌روزرسانی لیست پیشنهادی دسته‌بندی‌ها برای فیلد ورودی
function updateCategoryList() {
  const cats = [...new Set(menuItems.map(i => i.category).filter(Boolean))];
  document.getElementById('categoryList').innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">`).join('');
}

// نمایش آیتم‌ها گروه‌بندی‌شده بر اساس دسته (بر اساس ترتیب اولین ظهور در دیتا)
function renderList() {
  const container = document.getElementById('adminList');
  document.getElementById('itemCount').innerText = menuItems.length;

  if (menuItems.length === 0) {
    container.innerHTML = `<div class="text-center text-zinc-500 py-8">هیچ آیتمی بارگذاری نشد.</div>`;
    return;
  }

  // ترتیب دسته‌ها بر اساس اولین ظهورشان در دیتا
  const categoryOrder = [];
  menuItems.forEach(i => {
    const cat = i.category || 'بدون دسته';
    if (!categoryOrder.includes(cat)) categoryOrder.push(cat);
  });

  const sections = categoryOrder.map(cat => {
    const catItems = menuItems.filter(i => (i.category || 'بدون دسته') === cat);

    const itemsHtml = catItems.map(item => `
      <div class="bg-zinc-900 p-5 rounded-3xl flex gap-4">
        <div class="w-24 h-24 rounded-2xl overflow-hidden bg-zinc-800 flex-shrink-0">
          ${item.image ? `<img src="${escapeHtml(item.image)}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-6xl">${item.emoji || '☕'}</div>`}
        </div>
        <div class="flex-1">
          <div class="font-bold">${escapeHtml(item.name)} ${item.popular ? '<span class="text-orange-400 text-xs">🔥 محبوب</span>' : ''}</div>
          <div class="text-sm text-zinc-400">${escapeHtml(item.desc || '')}</div>
          <div class="text-amber-400">${isNaN(Number(item.price)) ? escapeHtml(item.price) : Number(item.price).toLocaleString()} تومان ${item.discount ? `<span class="text-red-400 text-xs">(${item.discount}% تخفیف)</span>` : ''}</div>
          <div class="text-xs text-zinc-500 mt-1">${item.rating ? `امتیاز: ${item.rating}` : ''}</div>
        </div>
        <div class="flex flex-col gap-2">
          <button onclick="editItem(${item.id})" class="text-blue-400">ویرایش</button>
          <button onclick="deleteItem(${item.id})" class="text-red-400">حذف</button>
        </div>
      </div>
    `).join('');

    return `
      <div>
        <h3 class="text-lg font-semibold mb-3 border-b border-zinc-800 pb-2">${escapeHtml(cat)} <span class="text-zinc-500 text-sm">(${catItems.length})</span></h3>
        <div class="space-y-4">${itemsHtml}</div>
      </div>
    `;
  }).join('');

  container.innerHTML = sections;
}

function editItem(id) {
  const item = menuItems.find(i => i.id === id);
  if (item) {
    document.getElementById('editId').value = item.id;
    document.getElementById('name').value = item.name;
    document.getElementById('price').value = item.price;
    document.getElementById('category').value = item.category;
    document.getElementById('desc').value = item.desc || '';
    document.getElementById('rating').value = item.rating || '';
    document.getElementById('discount').value = item.discount || '';
    document.getElementById('popular').checked = !!item.popular;
    document.getElementById('formTitle').innerText = 'ویرایش آیتم';
    document.getElementById('cancelBtn').classList.remove('hidden');
    if (item.image) {
      document.getElementById('previewImg').src = item.image;
      document.getElementById('preview').classList.remove('hidden');
    } else {
      document.getElementById('preview').classList.add('hidden');
    }
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function deleteItem(id) {
  if (confirm('این آیتم حذف شود؟')) {
    const token = document.getElementById('githubToken').value.trim();
    if (!token) { alert('برای حذف باید توکن را وارد کنید'); return; }
    menuItems = menuItems.filter(i => i.id !== id);
    renderList();
    saveMenuData(token);
  }
}

loadData();
</script>
</body>
</html>
