<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">پنل مدیریت</h1>
      <a href="index.html" class="text-amber-400 hover:underline">← منوی مشتری</a>
    </div>

    <!-- Token -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <label class="block mb-2 text-sm">GitHub Token</label>
      <input type="password" id="githubToken" placeholder="ghp_..." class="w-full bg-zinc-800 p-4 rounded-2xl">
    </div>

    <!-- Form -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <h2 class="text-xl mb-4">افزودن / ویرایش آیتم</h2>
      <form id="itemForm">
        <input type="hidden" id="editId">
        <div class="grid grid-cols-1 gap-4">
          <input id="name" placeholder="نام آیتم" class="bg-zinc-800 p-4 rounded-2xl" required>
          <div class="grid grid-cols-2 gap-4">
            <input id="price" placeholder="قیمت" class="bg-zinc-800 p-4 rounded-2xl" required>
            <input id="category" placeholder="دسته" class="bg-zinc-800 p-4 rounded-2xl" required>
          </div>
          <input id="desc" placeholder="توضیح" class="bg-zinc-800 p-4 rounded-2xl">
          <input id="emoji" placeholder="ایموجی" class="bg-zinc-800 p-4 rounded-2xl">
        </div>
        <button type="submit" class="mt-6 w-full bg-green-600 py-4 rounded-3xl font-medium">ذخیره و آپلود</button>
      </form>
    </div>

    <div id="status"></div>

    <!-- List -->
    <h2 class="text-xl font-semibold mb-4">آیتم‌ها</h2>
    <div id="adminList" class="space-y-3"></div>
  </div>

  <script>
    const OWNER = "mainemail84-blip";   // تغییر بده
    const REPO = "aboatash"; // تغییر بده

    let menuItems = [];

    async function loadData() {
      try {
        const res = await fetch(`menu-data.json?t=${Date.now()}`);
        menuItems = await res.json();
      } catch(e) {}
      renderList();
    }

    function renderList() {
      const container = document.getElementById('adminList');
      container.innerHTML = menuItems.map(item => `
        <div class="bg-zinc-900 p-5 rounded-3xl flex justify-between items-center">
          <div>
            <strong>${item.name}</strong><br>
            <span class="text-zinc-400 text-sm">${item.desc || ''} — ${item.price} هزار تومان</span>
          </div>
          <div class="flex gap-3">
            <button onclick="editItem(${item.id})" class="text-blue-400">ویرایش</button>
            <button onclick="deleteItem(${item.id})" class="text-red-400">حذف</button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('githubToken').value.trim();
      if (!token) return alert("توکن را وارد کنید!");

      const id = document.getElementById('editId').value;

      const newItem = {
        id: id ? Number(id) : Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        emoji: document.getElementById('emoji').value || "☕"
      };

      if (id) {
        menuItems = menuItems.map(item => item.id == id ? newItem : item);
      } else {
        menuItems.push(newItem);
      }

      const status = document.getElementById('status');
      status.innerHTML = 'در حال آپلود...';

      const success = await updateGitHub(token);
      if (success) {
        status.innerHTML = '<span class="text-green-400">✅ ذخیره و آپلود شد</span>';
        renderList();
        e.target.reset();
        document.getElementById('editId').value = '';
      }
    });

    async function updateGitHub(token) {
      try {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(menuItems, null, 2))));
        
        let sha = null;
        try {
          const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
            headers: { Authorization: `token ${token}` }
          });
          if (r.ok) sha = (await r.json()).sha;
        } catch {}

        await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/menu-data.json`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: "Update menu",
            content: content,
            sha: sha
          })
        });
        return true;
      } catch (err) {
        console.error(err);
        alert("خطا در آپلود");
        return false;
      }
    }

    function editItem(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('category').value = item.category;
        document.getElementById('desc').value = item.desc || '';
        document.getElementById('emoji').value = item.emoji || '';
      }
    }

    function deleteItem(id) {
      if (confirm('حذف شود؟')) {
        menuItems = menuItems.filter(i => i.id !== id);
        renderList();
        // Optional: auto save after delete
        // const token = document.getElementById('githubToken').value.trim();
        // if (token) updateGitHub(token);
      }
    }

    // Initial load
    loadData();
  </script>
</body>
</html>
