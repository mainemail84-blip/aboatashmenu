<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت - Lumina Café</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <i class="fa-solid fa-mug-hot text-amber-500"></i>
        پنل مدیریت
      </h1>
      <a href="index.html" class="text-amber-400 hover:underline">← دیدن منو مشتری</a>
    </div>

    <!-- Form -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">افزودن / ویرایش آیتم</h2>
      <form id="itemForm">
        <input type="hidden" id="editId">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="name" type="text" placeholder="نام آیتم" required class="bg-zinc-800 p-4 rounded-2xl">
          <input id="price" type="text" placeholder="قیمت (هزار تومان)" required class="bg-zinc-800 p-4 rounded-2xl">
          <input id="category" type="text" placeholder="دسته (coffee / tea / pastry / breakfast)" required class="bg-zinc-800 p-4 rounded-2xl">
          <input id="emoji" type="text" placeholder="ایموجی یا لینک عکس" class="bg-zinc-800 p-4 rounded-2xl">
          <input id="desc" type="text" placeholder="توضیح کوتاه" class="bg-zinc-800 p-4 rounded-2xl col-span-2">
        </div>
        <button type="submit" class="mt-6 w-full bg-green-600 hover:bg-green-700 py-4 rounded-3xl font-medium text-lg">
          ذخیره آیتم
        </button>
      </form>
    </div>

    <!-- Items List -->
    <h2 class="text-xl font-semibold mb-4">آیتم‌های فعلی</h2>
    <div id="adminList" class="space-y-3"></div>
  </div>

  <script>
    let menuItems = [];

    async function loadData() {
      try {
        const res = await fetch('menu-data.json');
        menuItems = await res.json();
        renderAdminList();
      } catch (e) {
        alert("فایل menu-data.json پیدا نشد!");
      }
    }

    function renderAdminList() {
      const container = document.getElementById('adminList');
      container.innerHTML = menuItems.map(item => `
        <div class="bg-zinc-900 rounded-3xl p-5 flex justify-between items-center">
          <div>
            <div class="font-bold">${item.name}</div>
            <div class="text-sm text-zinc-400">${item.desc} • ${item.price} هزار تومان</div>
          </div>
          <div class="flex gap-3">
            <button onclick="editItem(${item.id})" class="text-blue-400 hover:text-blue-300">
              <i class="fa-solid fa-pen"></i>
            </button>
            <button onclick="deleteItem(${item.id})" class="text-red-400 hover:text-red-300">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const id = document.getElementById('editId').value;
      const newItem = {
        id: id ? Number(id) : Date.now(),
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        category: document.getElementById('category').value,
        desc: document.getElementById('desc').value,
        emoji: document.getElementById('emoji').value || "☕"
      };

      if (id) {
        menuItems = menuItems.map(item => item.id == id ? newItem : item);
      } else {
        menuItems.push(newItem);
      }

      // ذخیره در فایل (در GitHub Pages این کار نیاز به backend دارد، فعلاً در مرورگر ذخیره می‌شود)
      alert('آیتم ذخیره شد!\n\nبرای ذخیره دائمی، فایل menu-data.json را به صورت دستی به‌روزرسانی کنید.');
      
      renderAdminList();
      e.target.reset();
      document.getElementById('editId').value = '';
    });

    function editItem(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('category').value = item.category;
        document.getElementById('desc').value = item.desc;
        document.getElementById('emoji').value = item.emoji;
      }
    }

    function deleteItem(id) {
      if (confirm('آیا از حذف این آیتم مطمئن هستید؟')) {
        menuItems = menuItems.filter(item => item.id !== id);
        renderAdminList();
      }
    }

    // بارگذاری اولیه
    loadData();
  </script>
</body>
</html>
